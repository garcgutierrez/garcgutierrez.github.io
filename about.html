<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>AR Avión - Aerodinámica</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        /* Capa 1: vídeo de la cámara, fondo */
        #camera-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);  /* espejo tipo selfie */
        }
        
        /* Capa 2: canvas de overlay (contorno QR + texto) */
        #qr-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none; /* no bloquea toques */
        }
        
        /* Capa 3: info fija opcional */
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 10px;
            z-index: 3;
            max-width: 320px;
            font-family: Arial, sans-serif;
            font-size: 12px;
        }
        
        #info p {
            margin: 0 0 4px 0;
        }

        /* Modal overlay (animated) */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            opacity: 0;
            visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4;
            pointer-events: none;
            transition: opacity 220ms ease, visibility 220ms ease;
        }
        #modal-overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        .modal-box {
            position: relative;
  background:#0b1117;
  color:#fff;
  border-radius:12px;
  padding:20px;
  max-width:90%;
  width:420px;

  /* NEW: keep the modal inside the viewport */
  max-height: 85vh;
  overflow: hidden;          /* body will scroll, header stays visible */
  display: flex;
  flex-direction: column;
        }
        .modal-box.open {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
        .modal-close {
            position: absolute;
            right: 10px;
            top: 8px;
            background: #d9534f;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
        }
        .modal-body {
            margin-top: 8px;
            font-size: 14px;
              /* NEW: scrolling area */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  max-height: calc(85vh - 70px);  /* subtract header/close/title area */
  padding-right: 6px;             /* space so scrollbar doesn’t overlap text */
        }
        /* Optional: nicer scrollbar (desktop) */
.modal-body::-webkit-scrollbar { width: 8px; }
.modal-body::-webkit-scrollbar-track { background: rgba(255,255,255,0.08); border-radius: 10px; }
.modal-body::-webkit-scrollbar-thumb { background: rgba(79,163,209,0.8); border-radius: 10px; }
.modal-body::-webkit-scrollbar-thumb:hover { background: rgba(130,212,245,0.9); }
  /* Video player area inside modal */
    #video-wrap{
      display:none;
      margin-top:12px;
      border-top:1px solid rgba(255,255,255,0.12);
      padding-top:12px;
    }
    #modal-video{
      width:100%;
      max-height: 45vh;
      background:#000;
      border-radius: 10px;
    }

        /* HUD controls */
        #hud-controls {
            position: fixed;
            right: 12px;
            bottom: 12px;
            z-index: 5;
            display: flex;
            gap: 8px;
            align-items: center;
            pointer-events: auto;
        }
        .hud-btn {
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: 1px solid rgba(0,255,0,0.35);
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        .hud-btn:active { transform: translateY(1px); }
    </style>

            function openVideoInModal(relativeSrc) {
      const wrap = document.getElementById('video-wrap');
      const videoEl = document.getElementById('modal-video');
      const srcEl = document.getElementById('modal-video-src');

      // show video area
      wrap.style.display = 'block';

      // set source and load
      srcEl.src = relativeSrc;    // e.g. "videos/video1.mp4"
      videoEl.load();

      // optional: autoplay (some browsers block autoplay with sound; muted helps)
      // videoEl.play().catch(() => {});
    }

    function stopVideoInModal() {
      const wrap = document.getElementById('video-wrap');
      const videoEl = document.getElementById('modal-video');
      const srcEl = document.getElementById('modal-video-src');

      try { videoEl.pause(); } catch(e) {}
      srcEl.src = "";
      try { videoEl.load(); } catch(e) {}
      wrap.style.display = 'none';
    }

                    <h3>WING</h3>
                    <p>
                    En un planeador, las alas son la clave del vuelo sin motor. Puesto que el principal objetivo del diseño del planeador

                    <p>
                    En este caso, las alas se incluyen en configuración alta (fíjate como se unen en la parte superior del fuselaje).

                    </p>
                    <p>
                    En cuanto a la estructura interna del ala, esta está formada por costillas, largueros y larguerillos, que recorren

                    </p>

            "AILERON": {
                titulo: "AILERON — Superficies de control del ala",
                contenido: `
                    <h3>Superficies de control del ala</h3>
                    <p>
                    Este planeador cuenta con tres superficies de control integradas en el ala.
                    </p>

                    <h4>Alerones</h4>
                    <p>
                    Los alerones permiten controlar el momento de alabeo. Al subir el alerón en un ala, reducimos su curvatura efectiva 
                    y su sustentación, mientras que, al bajar el alerón en el ala, aumentamos la curvatura y la generación de sustentación. 
                    Esa diferencia de sustentación entre alas genera un momento de alabeo que inclina el avión.
                    </p>
                    <p>
                    Con el ala inclinada, parte de la sustentación apunta hacia el interior del giro, lo que permite iniciar el viraje.
                    </p>
                    <p>
                    Como efecto secundario, el ala con alerón bajado suele aumentar más la resistencia, lo que puede inducir un momento 
                    de guiñada adversa, que se compensa con timón de dirección para conseguir un viraje coordinado.
                    </p>

                    <h4>Flaps</h4>
                    <p>
                    Los flaps permiten aumentar la sustentación al cambiar la curvatura del perfil, modificando la curva de sustentación 
                    del ala. Al deflectar los flaps, se produce un incremento del coeficiente de sustentación para un mismo ángulo de ataque, 
                    lo que permite obtener mayor margen de maniobra a bajas velocidades.
                    </p>
                    <p>
                    Este aumento de sustentación no es "gratis". Al deflectar los flaps, también aumentamos la resistencia aerodinámica, 
                    generalmente en mayor medida que el coeficiente de sustentación, lo que nos lleva a reducciones de la eficiencia aerodinámica.
                    </p>
                    <p>
                    <strong>Intenta identificar estas dos superficies de control.</strong> Fíjate en el material del que están hechas.
                    </p>

                    <h4>Aerofrenos</h4>
                    <p>

                    el aerofreno. En el intradós, se incluye otro aerofreno similar.
                    </p>
                    <p>
                    Al desplegarse los aerofrenos, aumenta la resistencia, permitiendo reducir la velocidad de vuelo durante la trayectoria 
                    de descenso y/o aterrizaje. El uso de aerofrenos permite perder altura sin tener que acelerar demasiado, y aterrizar 
                    de forma suave.
                    </p>
                    <p>

                        <li>Porción del ala donde se encuentran los alerones (posición y longitud)</li>

                    <p>
                    Estas medidas las utilizarás posteriormente para modelar el ala y sus superficies de control en el software xflr5.

                    <p>
                    Ahora dirígete hacia el QR ubicado en la cola.

                `

            "TAIL": {
                titulo: "TAIL — Sistema de estabilidad y control",
                contenido: `
                    <h3>La cola (Empenaje)</h3>
                    <p>
                    La cola (también conocida como empenaje) es el sistema principal de estabilidad y control de la aeronave. 
                    Las fuerzas aerodinámicas generadas por los perfiles aerodinámicos de la cola permiten que el avión sea estable 
                    y que el piloto pueda controlar la actitud y trayectoria de la aeronave. La cola de esta aeronave es de tipo 
                    convencional y se divide en dos partes:
                    </p>
                    <ul>
                        <li><strong>Empenaje horizontal:</strong> integra el estabilizador horizontal (parte fija) junto con el timón 
                        de profundidad (parte móvil) y trim tabs (parte móvil de menor superficie).</li>
                        <li><strong>Empenaje vertical:</strong> integra el estabilizador vertical (parte fija) junto con el timón 
                        de dirección (parte móvil).</li>
                    </ul>

                    <h4>¿Qué es lo que realmente hace cada una de estas superficies de control?</h4>

                    <h5>Timón de profundidad</h5>
                    <p>
                    El timón de profundidad controla el momento de cabeceo de la aeronave. Al deflectar esta superficie, cambiamos 
                    la curvatura efectiva del estabilizador horizontal, lo que produce un cambio en la sustentación del estabilizador horizontal.
                    </p>
                    <p>
                    El cambio en la componente vertical de la fuerza aerodinámica generada por el estabilizador horizontal provoca 
                    un cambio en el momento de cabeceo de la aeronave, en función de si el ángulo de deflexión es positivo o negativo.
                    </p>

                    <h5>Timón de dirección</h5>
                    <p>
                    El timón de dirección controla el momento de guiñada de la aeronave. Su principio de funcionamiento es similar 
                    al del timón de profundidad, aunque en este caso, la sustentación generada por el perfil será más o menos paralela 
                    al eje transversal de la aeronave.
                    </p>
                    <p>
                    La deflexión del timón de dirección permite cambiar la curvatura efectiva del perfil, creando una fuerza lateral 
                    en la cola. Esa fuerza lateral, por estar aplicada detrás del centro de gravedad, produce un momento de guiñada 
                    sobre la aeronave.
                    </p>

                    <h5>Trim tab del timón de profundidad</h5>
                    <p>
                    Si te fijas bien, en el borde de salida del timón de profundidad se puede apreciar una segunda superficie de control 
                    de menor superficie. Esta superficie de control se llama trim tab y permite equilibrar fuerzas. Al mover el trim tab, 
                    generamos una fuerza aerodinámica local sobre el timón de profundidad, que hace que el elevador permanezca en una 
                    posición fija sin que tengamos que estar aplicando una fuerza constante sobre el mando de control (la palanca).
                    </p>
                    <p>
                    Es decir, el trim tab crea un momento sobre el elevador que ajusta el punto de equilibrio del mando. Esto nos permitirá 
                    fijar una posición constante del timón de profundidad, lo que nos permitirá mantener una actitud o velocidad de forma cómoda.
                    </p>

                    <h5>Brazo de cola</h5>
                    <p>
                    La distancia de la cola al centro de gravedad de la aeronave se conoce como brazo de cola. Cuanto mayor sea la longitud 
                    del brazo de cola, mayor será el momento de control generado por ángulo de deflexión de las superficies de control.
                    </p>
                    <p>
                    <strong>Momento [N/m]=Fuerza [N]·Distancia [m]</strong>
                    </p>
                    <p>
                    Es decir: colocar la cola lejos, permite multiplicar su efecto.
                    </p>

                    <h4>Tarea:</h4>
                    <p>
                    De la misma forma que para el ala, mide y anota las siguientes medidas:
                    </p>
                    <ul>
                        <li>Posición de la cola a lo largo del eje longitudinal x (esto lo puedes medir como posición desde la nariz 
                        hasta el inicio de la cuerda en el encastre)</li>
                        <li>Distancia vertical a la nariz z</li>
                        <li>Cuerda en el encastre del estabilizador horizontal</li>
                        <li>Cuerda en la punta del estabilizador horizontal</li>
                        <li>Cuerda del timón de profundidad</li>
                        <li>Envergadura del estabilizador horizontal</li>
                        <li>Cuerda en el encastre del estabilizador vertical</li>
                        <li>Cuerda en la punta del estabilizador vertical</li>
                        <li>Cuerda del timón de dirección</li>
                        <li>Distancia desde el punto más alto del timón de profundidad hasta su encastre (span)</li>
                    </ul>
                    <p>
                    Esto nos permitirá modelar la cola de la aeronave en el software xflr5.
                    </p>
                    <p>
                    Dirígete hacia el QR situado en el tren de aterrizaje.
                    </p>
                `
            },
            "FUSELAGE": {
                titulo: "FUSELAGE — Estructura y aerodinámica",
                contenido: `
                    <h3>FUSELAGE</h3>
                    <p>
                    El fuselaje es el cuerpo de la aeronave, conecta la cabina, las alas y la cola, siendo la columna vertebral de la aeronave.

 <a href="#" onclick="openVideoInModal('images/video3.mp4'); return false;" title="Ver Vídeo 3">

        // ============ ESTADO PARA ESTABILIZAR LA VISUALIZACIÓN ============
        let ultimoQR = null;
        let ultimoTiempoDeteccion = 0;
        const TIEMPO_PERSISTENCIA = 1800;

        // ============ INICIO CÁMARA + LOOP QR ============
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
        }).then(stream => {
            video.srcObject = stream;

            video.addEventListener('loadedmetadata', () => {

            alert('Error: Permite acceso a cámara (' + err.message + ')');

        // ============ LOOP DE ESCANEO + DIBUJO ============
        function scanLoop() {
            const ahora = performance.now();

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                tempCanvas.width = video.videoWidth;
                tempCanvas.height = video.videoHeight;
                tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
                const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);

                const qrCode = jsQR(imageData.data, imageData.width, imageData.height);

                if (qrCode) {
                    const contenido = qrCode.data.trim();
                    const loc = qrCode.location;

                    const xMid = (loc.topLeftCorner.x + loc.topRightCorner.x +
                                  loc.bottomLeftCorner.x + loc.bottomRightCorner.x) / 4;
                    const yMid = (loc.topLeftCorner.y + loc.topRightCorner.y +
                                  loc.bottomLeftCorner.y + loc.bottomRightCorner.y) / 4;

                    const scaleX = qrCanvas.width / tempCanvas.width;
                    const scaleY = qrCanvas.height / tempCanvas.height;
                    const cx = xMid * scaleX;
                    const cy = yMid * scaleY;

                    ultimoQR = {
                        contenido,
                        cx,
                        cy,
                        locEscalado: {
                            tl: { x: loc.topLeftCorner.x * scaleX,     y: loc.topLeftCorner.y * scaleY },
                            tr: { x: loc.topRightCorner.x * scaleX,    y: loc.topRightCorner.y * scaleY },
                            br: { x: loc.bottomRightCorner.x * scaleX, y: loc.bottomRightCorner.y * scaleY },
                            bl: { x: loc.bottomLeftCorner.x * scaleX,  y: loc.bottomLeftCorner.y * scaleY }
                        }
                    };
                    ultimoTiempoDeteccion = ahora;

                    try {
                        if (!modalAbierto || modalCurrentKey !== contenido) {
                            showModal(contenido, cx, cy);
                        } else {
                            createOrMovePersistentMesh(cx, cy, contenido);
                        }
                    } catch (e) { }
                }
            }

            qrCtx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);

            if (ultimoQR && (ahora - ultimoTiempoDeteccion) < TIEMPO_PERSISTENCIA) {
                dibujarEtiquetaQR(ultimoQR);
            } else {
                ultimoQR = null;
            }

            try { renderThree(); } catch(e) { }

            requestAnimationFrame(scanLoop);
        }

        // ============ DIBUJAR ETIQUETA JUNTO AL QR ============
        function dibujarEtiquetaQR(dataQR) {
            const { contenido, cx, cy, locEscalado } = dataQR;

            const texto = explicaciones[contenido]
                ? explicaciones[contenido]
                : "QR: " + contenido;

            const padding = 6;
            const maxWidth = 220;
            qrCtx.font = "14px Arial";
            qrCtx.textBaseline = "top";

            const words = texto.split(" ");
            const lineHeight = 18;
            let line = "";
            const lines = [];
            for (let n = 0; n < words.length; n++) {
                const testLine = line + words[n] + " ";
                const testWidth = qrCtx.measureText(testLine).width;
                if (testWidth > maxWidth - 2 * padding && n > 0) {
                    lines.push(line);
                    line = words[n] + " ";
                } else {
                    line = testLine;
                }
            }
            lines.push(line);

            const boxWidth = maxWidth;
            const boxHeight = lines.length * lineHeight + 2 * padding;

            let boxX = cx + 20;
            let boxY = cy - boxHeight / 2;

            if (boxX + boxWidth > qrCanvas.width) {
                boxX = cx - 20 - boxWidth;
            }
            if (boxY < 10) boxY = 10;
            if (boxY + boxHeight > qrCanvas.height - 10) {
                boxY = qrCanvas.height - 10 - boxHeight;
            }

            qrCtx.fillStyle = "rgba(0, 0, 0, 0.7)";
            qrCtx.fillRect(boxX, boxY, boxWidth, boxHeight);

            qrCtx.strokeStyle = "rgba(0, 255, 0, 0.9)";
            qrCtx.lineWidth = 2;
            qrCtx.strokeRect(boxX, boxY, boxWidth, boxHeight);

            qrCtx.fillStyle = "#ffffff";
            let textY = boxY + padding;
            for (let i = 0; i < lines.length; i++) {
                qrCtx.fillText(lines[i], boxX + padding, textY);
                textY += lineHeight;
            }

            const loc = locEscalado;
            qrCtx.strokeStyle = "rgba(0, 255, 0, 0.8)";
            qrCtx.lineWidth = 3;
            qrCtx.beginPath();
            qrCtx.moveTo(loc.tl.x, loc.tl.y);
            qrCtx.lineTo(loc.tr.x, loc.tr.y);
            qrCtx.lineTo(loc.br.x, loc.br.y);
            qrCtx.lineTo(loc.bl.x, loc.bl.y);
            qrCtx.closePath();
            qrCtx.stroke();
        }
